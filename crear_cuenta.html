<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>https://JoelPortafolio.com</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='crear_cuenta.css') }}">
</head>
<body>
    <div class="portafolio">
        <center><h1>Iniciar sesion</h1></center>
    </div>

    <div class="header">
        <h2 class="logo">Logo</h2>
        <nav class="navigation">
            <a href="{{ url_for('logging_page') }}">Inicio</a>
            <a href="{{ url_for('crear_page') }}">Crear Cuenta</a>
        </nav>
    </div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="formulario">
        {% for message in messages %}
        <p>{{ message }}</p>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="formulario">
        <h2>Crear Cuenta</h2>
        <form action="{{ url_for('submit') }}" method="post">
            <label for="nombre">Nombre a utilizar:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>

            <label for="email">Correo Electronico:</label>
            <input type="email" id="email" name="email" placeholder="Ingresa tu correo" required>

            <label for="password">Contrasena a utilizar:</label>
            <input type="password" id="password" name="password" placeholder="Crea una contrasena" required>

            <button type="submit">Enviar</button>
        </form>
    </div>
</body>
</html>
